name: validate-vault

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run vault doctor
        run: |
          python3 skills/vault/scripts/vault_doctor.py --vault-root scaffold/vault --strict
